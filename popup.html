<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NaviPet</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      width: 280px;
      margin: 0;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      text-align: center;
      color: #333;
      transition: background 1s ease;
      overflow: hidden;
      position: relative;
    }

    body.theme-night {
      background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.9rem;
      margin: 0 0 15px 0;
      color: #2c3e50;
      text-shadow: 1px 1px 0px rgba(255,255,255,0.7);
    }
    
    body.theme-night h1 {
      color: #ecf0f1;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.7);
    }

    .header-stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .badge {
      font-family: 'Press Start 2P', cursive;
      background: #f1c40f;
      color: #fff;
      padding: 6px 8px;
      border-radius: 10px;
      font-size: 0.55rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      border: 2px solid #f39c12;
    }
    
    .badge.coins {
      background: #e67e22;
      border-color: #d35400;
    }

    .screen {
      background-color: rgba(255, 255, 255, 0.9);
      border: 4px solid #34495e;
      border-radius: 12px;
      padding: 20px 10px;
      margin-bottom: 15px;
      position: relative;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    body.theme-night .screen {
      background-color: rgba(236, 240, 241, 0.85);
      border-color: #2c3e50;
    }

    .avatar {
      font-size: 70px;
      margin: 10px 0;
      user-select: none;
      filter: drop-shadow(0px 5px 2px rgba(0,0,0,0.2));
      display: inline-block;
      transition: transform 0.2s;
    }

    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes eat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2) translateY(-5px); } }
    @keyframes sleep { 0%, 100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 0.8; } 50% { transform: scale(0.95) translateY(5px) rotate(5deg); opacity: 0.5; } }
    @keyframes pet { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(5deg); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

    .anim-idle { animation: bob 2s ease-in-out infinite; }
    .anim-eat { animation: eat 0.4s ease-in-out; }
    .anim-sleep { animation: sleep 3s ease-in-out infinite; }
    .anim-pet { animation: pet 0.3s ease-in-out; }
    .anim-shake { animation: shake 0.3s ease-in-out; }

    .status-message {
      height: 20px;
      font-size: 0.75rem;
      font-weight: bold;
      color: #e74c3c;
      margin-top: 10px;
    }

    .bars-container {
      display: grid;
      gap: 8px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.5);
      padding: 10px;
      border-radius: 10px;
    }
    
    body.theme-night .bars-container { background: rgba(0,0,0,0.2); }

    .bar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: bold;
      color: #2c3e50;
    }
    
    body.theme-night .bar-row { color: #ecf0f1; }

    .bar-wrapper {
      width: 65%;
      height: 12px;
      background-color: #bdc3c7;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    }

    .bar-fill {
      height: 100%;
      width: 100%;
      transition: width 0.3s ease-out, background-color 0.3s;
    }
    
    .fill-faim { background-color: #e74c3c; }
    .fill-joie { background-color: #f1c40f; }
    .fill-energie { background-color: #3498db; }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      padding: 8px 5px;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      color: white;
      transition: transform 0.1s, filter 0.2s, box-shadow 0.1s;
      box-shadow: 0 4px 0px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    button:hover { filter: brightness(1.1); }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0px rgba(0,0,0,0.2);
    }
    
    button:disabled {
      filter: grayscale(100%);
      cursor: not-allowed;
      box-shadow: 0 4px 0px #7f8c8d !important;
      transform: translateY(0);
    }

    .btn-work { background-color: #9b59b6; box-shadow: 0 4px 0px #8e44ad; }
    .btn-feed { background-color: #e74c3c; box-shadow: 0 4px 0px #c0392b; }
    .btn-play { background-color: #2ecc71; box-shadow: 0 4px 0px #27ae60; }
    .btn-sleep { background-color: #3498db; box-shadow: 0 4px 0px #2980b9; }

    .btn-subtext {
      font-size: 0.55rem;
      opacity: 0.9;
      font-weight: normal;
      margin-top: 4px;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      font-size: 1.5rem;
      animation: floatUp 1s ease-out forwards;
      z-index: 100;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(0.8); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
    }

    .instructions {
      font-size: 0.65rem;
      color: #7f8c8d;
      margin-top: 15px;
      opacity: 0.9;
    }
    body.theme-night .instructions { color: #bdc3c7; }
  </style>
</head>
<body>

  <h1>NaviPet Console</h1>
  
  <div class="header-stats">
    <div class="badge" id="level-display">Niv. 1</div>
    <div class="badge coins" id="coins-display">🪙 0</div>
  </div>
  
  <div class="screen" id="screen-area" title="Cliquez pour caresser !">
    <div class="avatar anim-idle" id="avatar">🥚</div>
    <div class="status-message" id="status-message"></div>
  </div>

  <div class="bars-container">
    <div class="bar-row">
      <span>Faim</span>
      <div class="bar-wrapper"><div class="bar-fill fill-faim" id="bar-faim"></div></div>
    </div>
    <div class="bar-row">
      <span>Joie</span>
      <div class="bar-wrapper"><div class="bar-fill fill-joie" id="bar-joie"></div></div>
    </div>
    <div class="bar-row">
      <span>Énergie</span>
      <div class="bar-wrapper"><div class="bar-fill fill-energie" id="bar-energie"></div></div>
    </div>
  </div>

  <div class="actions">
    <button id="btn-work" class="btn-work">💻 Coder<span class="btn-subtext">+10🪙 | -20⚡</span></button>
    <button id="btn-feed" class="btn-feed">🍎 Nourrir<span class="btn-subtext">Coût: 5🪙</span></button>
    <button id="btn-play" class="btn-play">🕹️ Jouer<span class="btn-subtext">+Joie | -15⚡</span></button>
    <button id="btn-sleep" class="btn-sleep">🛏️ Dormir<span class="btn-subtext">Récupère ⚡</span></button>
  </div>

  <div class="instructions">Astuce : Cliquez sur l'écran pour caresser !</div>

  <script src="popup.js"></script>
</body>
</html>
