<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NaviPet</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #87CEEB;
      --text-color: #2c3e50;
      --panel-bg: rgba(255, 255, 255, 0.9);
      --border-color: #34495e;
    }
    body.theme-night {
      --bg-color: #2c3e50;
      --text-color: #ecf0f1;
      --panel-bg: rgba(0, 0, 0, 0.8);
      --border-color: #7f8c8d;
    }
    body {
      width: 320px;
      margin: 0;
      font-family: 'Press Start 2P', monospace;
      background-color: var(--bg-color);
      color: var(--text-color);
      text-align: center;
      transition: background-color 1s ease;
      user-select: none;
    }
    .hidden { display: none !important; }

    /* ===== ONBOARDING ===== */
    #onboarding-screen {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 400px;
      justify-content: center;
    }
    .slider-container { display:flex; align-items:center; justify-content:center; gap:15px; margin:20px 0; }
    .slider-btn { background:var(--panel-bg); border:2px solid var(--border-color); color:var(--text-color); font-family:inherit; padding:10px; cursor:pointer; border-radius:5px; font-size:16px; }
    .slider-btn:hover { background:#f1c40f; }
    .name-input { font-family:inherit; padding:10px; margin-bottom:20px; width:80%; border:2px solid var(--border-color); border-radius:5px; text-align:center; font-size:10px; }
    #btn-adopt { background-color:#2ecc71; color:white; border:2px solid #27ae60; padding:15px; width:100%; font-family:inherit; font-size:12px; cursor:pointer; border-radius:8px; }
    #btn-adopt:hover { background-color:#27ae60; }

    /* ===== GAME SCREEN ===== */
    #game-screen { display:flex; flex-direction:column; min-height:480px; }
    .header { background-color:var(--panel-bg); padding:10px; border-bottom:2px solid var(--border-color); display:flex; justify-content:space-between; font-size:10px; color:var(--text-color); }
    
    #screen-area {
      height:180px; position:relative; display:flex; justify-content:center;
      align-items:center; flex-direction:column; cursor:pointer; overflow:hidden;
    }

    /* Avatar + Accessoire superposé */
    .avatar-wrapper { position:relative; display:inline-flex; justify-content:center; align-items:flex-start; z-index:10; }
    .avatar { font-size:64px; display:inline-block; filter:drop-shadow(2px 4px 6px rgba(0,0,0,0.3)); }
    #accessory-layer {
      position:absolute; top:-20px; left:50%; transform:translateX(-50%);
      font-size:28px; pointer-events:none; z-index:11; line-height:1;
    }

    #status-message { margin-top:10px; font-size:10px; height:10px; z-index:10; color:var(--text-color); }
    #pet-name-display { font-size:14px; color:#e67e22; margin-bottom:5px; }
    
    .stats-panel { background-color:var(--panel-bg); padding:10px; border-top:2px solid var(--border-color); }
    .stat-row { display:flex; align-items:center; margin-bottom:8px; font-size:9px; color:var(--text-color); }
    .stat-label { width:60px; text-align:left; }
    .bar-container { flex-grow:1; background-color:rgba(0,0,0,0.2); height:10px; border-radius:5px; overflow:hidden; margin:0 10px; border:1px solid var(--border-color); }
    .bar-fill { height:100%; transition:width 0.3s ease, background-color 0.3s ease; }
    .bar-danger { background-color:#e74c3c !important; }
    
    .controls { display:grid; grid-template-columns:1fr 1fr; gap:5px; padding:10px; background-color:var(--panel-bg); }
    .action-btn { background-color:var(--bg-color); border:2px solid var(--border-color); border-radius:5px; padding:10px; font-family:inherit; font-size:9px; cursor:pointer; transition:transform 0.1s; display:flex; flex-direction:column; align-items:center; gap:5px; color:var(--text-color); }
    .action-btn:hover { filter:brightness(1.1); transform:translateY(-2px); }
    .action-btn:active { transform:translateY(0); }
    .action-btn.arcade { background-color:#a29bfe; color:white; border-color:#6c5ce7; }
    .action-btn.arcade:hover { background-color:#6c5ce7; }
    .action-btn.danger { background-color:#ff7675; color:white; border-color:#d63031; }
    .action-btn.danger:hover { background-color:#d63031; }

    /* ===== BOUTIQUE ===== */
    #shop-screen { display:flex; flex-direction:column; min-height:480px; padding-top:20px; }

    .shop-tabs { display:flex; gap:5px; margin:0 15px 10px 15px; }
    .shop-tab { flex:1; padding:8px 4px; font-family:inherit; font-size:7px; cursor:pointer; border:2px solid var(--border-color); border-radius:5px; background:var(--panel-bg); color:var(--text-color); }
    .shop-tab.tab-active { background:#f1c40f; color:#2c3e50; border-color:#f39c12; }
    .shop-tab:hover { filter:brightness(1.1); }

    #shop-items { flex-grow:1; display:flex; flex-direction:column; gap:8px; padding:0 15px; overflow-y:auto; margin-bottom:10px; max-height:330px; }

    /* ===== ARCADE ===== */
    #arcade-screen { display:flex; flex-direction:column; min-height:480px; align-items:center; padding-top:20px; }
    #arcade-menu { width:100%; }
    .arcade-choice { display:flex; flex-direction:column; gap:10px; padding:0 20px; margin-top:15px; }
    .arcade-game-btn { background:var(--panel-bg); border:3px solid var(--border-color); border-radius:10px; padding:15px; font-family:inherit; font-size:10px; cursor:pointer; color:var(--text-color); }
    .arcade-game-btn:hover { background:#a29bfe; color:white; border-color:#6c5ce7; }
    
    #bug-game-area { width:100%; }
    #mg-area { position:relative; height:220px; background-color:#2c3e50; margin:0 15px 10px 15px; border-radius:10px; overflow:hidden; border:3px solid var(--border-color); cursor:crosshair; }

    /* ===== MEMORY ===== */
    #memory-screen { display:flex; flex-direction:column; min-height:480px; align-items:center; padding-top:20px; }
    #memory-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; padding:0 15px; margin:10px 0; }
    .memory-card { width:60px; height:60px; background:var(--panel-bg); border:2px solid var(--border-color); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; transition:transform 0.15s; }
    .memory-card:hover { transform:scale(1.05); }
    .memory-card.flipped { border-color:#2ecc71; }
    #memory-status { font-size:9px; color:white; margin:5px 0 10px 0; min-height:14px; }

    /* ===== ANIMATIONS ===== */
    .particle { position:absolute; font-size:20px; pointer-events:none; animation:floatUp 1s ease-out forwards; z-index:15; }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-50px) scale(1.5);} }
    @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
    @keyframes eat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.2);} }
    @keyframes sleep { 0%,100%{transform:scale(1) rotate(0deg);} 50%{transform:scale(0.95) rotate(5deg);} }
    .anim-idle  { animation:bob 2s infinite ease-in-out; }
    .anim-shake { animation:shake 0.5s infinite; }
    .anim-eat   { animation:eat 0.5s ease; }
    .anim-sleep { animation:sleep 3s infinite ease-in-out; }

    /* ===== BACKGROUNDS ===== */
    .bg-default { background:transparent; }
    .bg-hacker  { background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); box-shadow:inset 0 0 10px #00ff00; }
    .bg-beach   { background:linear-gradient(to bottom,#87CEEB 0%,#87CEEB 60%,#eed690 60%,#e6ca7b 100%); }
    .bg-forest  { background:linear-gradient(to bottom,#2b5876,#4e4376); border-bottom:20px solid #1e824c; }
    .bg-space   { background:radial-gradient(circle at bottom,#1b2735 0%,#090a0f 100%); }
  </style>
</head>
<body class="theme-day">

  <!-- ======================== ONBOARDING ======================== -->
  <div id="onboarding-screen">
    <h2 style="color:#d35400;margin-top:0;">Adoption 🥚</h2>
    <p style="font-size:10px;margin-bottom:20px;line-height:1.5;">Choisis et nomme<br>ton nouveau compagnon !</p>
    <div class="slider-container">
      <button id="slide-left" class="slider-btn">◀</button>
      <div id="slider-avatar" class="avatar anim-idle">🥚</div>
      <button id="slide-right" class="slider-btn">▶</button>
    </div>
    <p id="species-name" style="font-size:12px;margin-bottom:20px;color:var(--text-color);">Dragon</p>
    <input type="text" id="pet-name-input" class="name-input" placeholder="Son p'tit nom..." maxlength="12">
    <button id="btn-adopt">ADOPTER 💚</button>
  </div>

  <!-- ======================== GAME SCREEN ======================== -->
  <div id="game-screen" class="hidden">
    <div class="header">
      <div style="flex-grow:1;text-align:left;padding-right:15px;">
        <div id="pet-name-display">NaviPet</div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:8px;">
          <div id="level-display">Niv. 1</div>
          <div style="font-size:8px;">XP</div>
        </div>
        <div style="background:rgba(0,0,0,0.2);height:5px;border-radius:3px;overflow:hidden;margin-top:3px;">
          <div id="bar-xp" style="height:100%;width:0%;background-color:#9b59b6;transition:width 0.3s ease;"></div>
        </div>
      </div>
      <div style="text-align:right;min-width:65px;">
        <div style="margin-bottom:5px;">🪙 <span id="coins-display">0</span></div>
        <div style="font-size:8px;color:var(--border-color);">DevCoins</div>
      </div>
    </div>

    <div id="screen-area">
      <!-- L'avatar et son accessoire -->
      <div class="avatar-wrapper">
        <div id="avatar" class="avatar anim-idle">🥚</div>
        <div id="accessory-layer" style="display:none;"></div>
      </div>
      <div id="status-message"></div>
    </div>

    <div class="stats-panel">
      <div class="stat-row">
        <span class="stat-label">Faim</span>
        <div class="bar-container"><div id="bar-faim" class="bar-fill" style="width:80%;background-color:#2ecc71;"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-label">Joie</span>
        <div class="bar-container"><div id="bar-joie" class="bar-fill" style="width:80%;background-color:#f1c40f;"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-label">Énergie</span>
        <div class="bar-container"><div id="bar-energie" class="bar-fill" style="width:100%;background-color:#3498db;"></div></div>
      </div>
    </div>

    <div class="controls">
      <button id="btn-work"  class="action-btn">💻<br>Coder</button>
      <button id="btn-feed"  class="action-btn">🍎<br>Nourrir</button>
      <button id="btn-play"  class="action-btn">⚽<br>Jouer</button>
      <button id="btn-sleep" class="action-btn">🛏️<br>Dormir</button>
      <button id="btn-arcade" class="action-btn arcade">🎮<br>Arcade</button>
      <button id="btn-shop"  class="action-btn" style="background-color:#f1c40f;color:#2c3e50;border-color:#f39c12;">🛒<br>Boutique</button>
    </div>
  </div>

  <!-- ======================== BOUTIQUE ======================== -->
  <div id="shop-screen" class="hidden" style="display:flex;flex-direction:column;min-height:480px;padding-top:20px;">
    <h2 style="color:#f1c40f;margin-top:0;font-size:14px;">🛒 Boutique</h2>
    <div style="font-size:9px;margin-bottom:10px;color:var(--text-color);">Solde : <span id="shop-coins" style="color:#f1c40f;">0</span> 🪙</div>

    <!-- Onglets -->
    <div class="shop-tabs">
      <button id="shop-tab-bgs"  class="shop-tab tab-active">🏞️ Décors</button>
      <button id="shop-tab-food" class="shop-tab">🍕 Nourriture</button>
      <button id="shop-tab-acc"  class="shop-tab">🎩 Accessoires</button>
    </div>

    <div id="shop-items"></div>

    <button id="btn-shop-quit" class="action-btn danger" style="width:80%;margin:0 auto 15px auto;padding:12px;font-size:11px;">← Retour</button>
  </div>

  <!-- ======================== ARCADE ======================== -->
  <div id="arcade-screen" class="hidden" style="display:flex;flex-direction:column;min-height:480px;align-items:center;padding-top:20px;">
    
    <!-- Menu choix jeu -->
    <div id="arcade-menu">
      <h2 style="color:white;margin-top:0;font-size:14px;">🕹️ Arcade</h2>
      <p style="font-size:8px;color:rgba(255,255,255,0.8);margin-bottom:5px;">Choisis ton jeu !</p>
      <div class="arcade-choice">
        <button id="btn-start-bugs" class="arcade-game-btn">
          🐛 Chasse aux Bugs<br>
          <span style="font-size:7px;opacity:0.7;">Écrase les bugs en 15 sec !</span>
        </button>
        <button id="btn-start-memory" class="arcade-game-btn">
          🧠 Memory<br>
          <span style="font-size:7px;opacity:0.7;">Retrouve toutes les paires !</span>
        </button>
      </div>
      <button id="btn-mg-quit" class="action-btn danger" style="width:80%;margin:20px auto 0;padding:12px;font-size:11px;">← Retour</button>
    </div>

    <!-- Zone Chasse aux Bugs -->
    <div id="bug-game-area" class="hidden" style="width:100%;">
      <h2 style="color:white;margin-top:0;font-size:13px;">🐛 Chasse aux Bugs</h2>
      <div style="display:flex;justify-content:space-between;padding:0 20px;font-size:10px;margin-bottom:5px;color:white;">
        <span>⏱ <span id="mg-timer">15</span>s</span>
        <span>Score : <span id="mg-score" style="color:#f1c40f;">0</span></span>
      </div>
      <div id="mg-area"></div>
    </div>
  </div>

  <!-- ======================== MEMORY ======================== -->
  <div id="memory-screen" class="hidden" style="background:linear-gradient(135deg,#2c3e50,#3498db);">
    <h2 style="color:white;margin-top:20px;font-size:13px;">🧠 Memory</h2>
    <div id="memory-status">Retourne les paires ! 🧠</div>
    <div id="memory-grid"></div>
    <button id="btn-memory-quit" class="action-btn danger" style="width:80%;margin:0 auto 20px;padding:12px;font-size:11px;">← Retour</button>
  </div>

  <script src="popup.js"></script>
  <div style="text-align:center;padding-bottom:10px;background:var(--panel-bg);">
    <a id="btn-reset" href="#" style="color:#e74c3c;font-size:8px;text-decoration:none;">[Danger: Reset Sauvegarde]</a>
  </div>
</body>
</html>
